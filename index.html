
<html>
<head>
<meta charset="UTF-8">
<title>NEXUS v5</title>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {margin:0;font-family:system-ui;background:#0a0f1c;color:#e0e6ff;}
nav {display:flex;gap:10px;padding:12px;background:rgba(20,25,40,0.8);}
input {flex:1;padding:8px;background:#111827;border:none;color:#fff;border-radius:6px;}
#map {height:70vh}
.panel {position:fixed;right:0;top:0;width:350px;height:100%;background:#0f172a;padding:20px;overflow:auto;transform:translateX(100%);transition:.3s;}
.panel.open {transform:translateX(0)}
.card {background:#111827;padding:12px;border-radius:8px;margin-top:10px;}
.btn {background:#2563eb;border:none;padding:6px 10px;color:white;margin:5px 3px;border-radius:5px;cursor:pointer;}
@media(max-width:700px){.panel{width:100%}}
</style>
</head>

<body>

<nav>
  <input placeholder="Search country..." oninput="searchCountry(this.value)">
</nav>

<svg id="map"></svg>
<div class="panel" id="panel"></div>

<script>

const CONFLICT_INDEX = {USA:95,RUS:90,CHN:70,DEU:80,FRA:75};

const COUNTRY_DATA = {
  DEU:{name:"Germany",gdp:[3.8,4.0,4.2,4.5],military:[50,55,60],timeline:["1871 Empire","1945 WWII","1990 Reunification"]},
  USA:{name:"USA",gdp:[20,21,22,25],military:[700,750,800],timeline:["1776 Independence","1945 Superpower","2001 War on Terror"]}
};

const svg=d3.select("#map");
const g=svg.append("g");

const projection=d3.geoNaturalEarth1()
  .scale(window.innerWidth/6)
  .translate([window.innerWidth/2,300]);

const path=d3.geoPath().projection(projection);

svg.call(d3.zoom().on("zoom",e=>{g.attr("transform",e.transform);}));

d3.json("https://raw.githubusercontent.com/holtzy/D3-graph-gallery/master/DATA/world.geojson")
.then(data=>{
  g.selectAll("path")
    .data(data.features)
    .enter()
    .append("path")
    .attr("d",path)
    .attr("fill",d=>getColor(CONFLICT_INDEX[d.id]||0))
    .attr("stroke","#111")
    .on("click",(e,d)=>openCountry(d.id));
});

function getColor(s){
  if(s>85)return "#7f1d1d";
  if(s>70)return "#dc2626";
  if(s>50)return "#f59e0b";
  return "#10b981";
}

function openCountry(code){
  const c=COUNTRY_DATA[code];
  if(!c)return;
  const panel=document.getElementById("panel");
  panel.classList.add("open");

  panel.innerHTML=`
    <h2>${c.name}</h2>
    <div class="card"><strong>Conflict Index:</strong> ${CONFLICT_INDEX[code]||0}</div>
    <div class="card"><canvas id="gdpChart"></canvas></div>
    <div class="card"><canvas id="milChart"></canvas></div>
    <div class="card"><strong>Timeline</strong>${c.timeline.map(t=>"<p>"+t+"</p>").join("")}</div>
    <div class="card">
      <button class="btn" onclick="explain('simple')">Simple</button>
      <button class="btn" onclick="explain('geo')">Geo</button>
      <button class="btn" onclick="explain('history')">History</button>
      <p id="explainBox"></p>
    </div>
  `;
  renderCharts(c);
}

function renderCharts(c){
  new Chart(document.getElementById("gdpChart"),{
    type:"line",
    data:{labels:["2018","2019","2020","2021"],datasets:[{label:"GDP",data:c.gdp}]}
  });

  new Chart(document.getElementById("milChart"),{
    type:"bar",
    data:{labels:["2019","2020","2021"],datasets:[{label:"Military",data:c.military}]}
  });
}

function explain(type){
  const box=document.getElementById("explainBox");
  if(type==="simple") box.innerText="This country is important globally.";
  if(type==="geo") box.innerText="Geopolitically influential nation.";
  if(type==="history") box.innerText="Long historical development.";
}

function searchCountry(q){
  q=q.toLowerCase();
  Object.keys(COUNTRY_DATA).forEach(code=>{
    if(COUNTRY_DATA[code].name.toLowerCase().includes(q)){
      openCountry(code);
    }
  });
}

</script>

</body>
</html>
